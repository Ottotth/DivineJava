spring.application.name=divine
openrouter.api.key=${OPENROUTER_API_KEY}

# In-memory H2 datasource for local run/tests (prevents "Failed to determine a suitable driver class")
spring.datasource.url=jdbc:h2:mem:divine;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate (in-memory)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
